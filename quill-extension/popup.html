<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 260px;
      padding: 18px 18px 16px;
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      background: #F7F4EF;
      color: #1A1714;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .wordmark {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #1A1714;
    }
    .open-link {
      font-size: 11px;
      color: #9A9284;
      text-decoration: none;
      padding: 3px 8px;
      border-radius: 100px;
      background: rgba(154,146,132,0.12);
      transition: background 0.12s;
    }
    .open-link:hover { background: rgba(154,146,132,0.22); }

    /* ── Status card ── */
    .status-card {
      background: #fff;
      border: 0.5px solid rgba(154,146,132,0.25);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #C4BDB0;
      flex-shrink: 0;
    }
    .dot.connected { background: #52A05D; }
    .dot.error     { background: #C0614A; }
    .dot.pending   { background: #C4BDB0; }

    .status-label {
      font-size: 13px;
      font-weight: 500;
      color: #1A1714;
      flex: 1;
    }
    .last-sync {
      font-size: 10px;
      color: #C4BDB0;
      margin-top: 6px;
      padding-left: 15px;
    }

    /* ── Hint ── */
    .hint {
      font-size: 11px;
      color: #9A9284;
      line-height: 1.55;
      margin-bottom: 12px;
    }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 8px 12px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity 0.12s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-decoration: none;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: #1A1714;
      color: #F7F4EF;
    }
    .btn-primary:hover:not(:disabled) { opacity: 0.85; }

    .btn-secondary {
      background: rgba(154,146,132,0.15);
      color: #1A1714;
    }
    .btn-secondary:hover:not(:disabled) { background: rgba(154,146,132,0.25); }

    /* ── Divider ── */
    .divider {
      height: 0.5px;
      background: rgba(154,146,132,0.2);
      margin: 10px 0;
    }

    /* Hidden by default */
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="header">
    <span class="wordmark">Quill</span>
    <a id="open-quill" href="#" class="open-link" target="_blank">Open app ↗</a>
  </div>

  <div class="status-card">
    <div class="status-row">
      <div class="dot" id="dot"></div>
      <span class="status-label" id="status-text">Checking…</span>
    </div>
    <p class="last-sync" id="last-sync"></p>
  </div>

  <p class="hint" id="hint"></p>

  <!-- Sign in button (shown when not logged in) -->
  <a id="signin-btn" href="#" class="btn btn-primary hidden" target="_blank">
    Sign in to Quill
  </a>

  <!-- Sync button (shown when logged in) -->
  <button id="sync-btn" class="btn btn-secondary hidden">
    Sync now
  </button>

  <script type="module" src="popup.js"></script>
</body>
</html>
